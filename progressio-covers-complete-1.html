<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROGRESSIO — Okładka przód + tył</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #080808;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 50px 20px;
    gap: 40px;
  }
  .ui-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: rgba(201,168,76,0.3);
    text-transform: uppercase;
    text-align: center;
  }
  .covers-row {
    display: flex;
    gap: 0;
    align-items: flex-start;
    justify-content: center;
    flex-wrap: wrap;
  }
  .cover-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .cover-unit-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    font-style: italic;
  }
  .cover {
    width: 291px;
    height: 408px;
    background: #111110;
    position: relative;
    overflow: hidden;
  }

  /* FRONT */
  .front {
    box-shadow: -3px 0 6px rgba(0,0,0,0.5), 8px 0 30px rgba(0,0,0,0.8), 0 16px 50px rgba(0,0,0,0.9);
  }
  .front::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 10px;
    background: linear-gradient(to right, rgba(0,0,0,0.7) 0%, rgba(255,255,255,0.04) 60%, transparent 100%);
    z-index: 10;
  }
  .front .bg-glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 40% at 50% 35%, rgba(201,168,76,0.05) 0%, transparent 100%);
    pointer-events: none;
    z-index: 1;
  }
  .front .content {
    position: absolute;
    top: 80px;
    left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 2;
  }
  .front .line-top {
    width: 1px; height: 40px;
    background: linear-gradient(to bottom, transparent, rgba(201,168,76,0.7));
    margin-bottom: 18px;
    animation: fadeIn 1s ease 0.1s both;
  }
  .front .brand {
    font-family: 'Cinzel', serif;
    font-size: 26px; font-weight: 600;
    letter-spacing: 9px; color: #c9a84c;
    text-transform: uppercase; text-align: center;
    animation: fadeUp 0.8s ease 0.3s both;
  }
  .front .gold-rule {
    width: 100px; height: 1px;
    background: linear-gradient(to right, transparent, #c9a84c, transparent);
    margin: 16px 0;
    animation: expandX 0.8s ease 0.7s both;
  }
  .front .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 9.5px; font-style: italic; font-weight: 300;
    letter-spacing: 4.5px; color: rgba(201,168,76,0.65);
    text-transform: uppercase; text-align: center;
    animation: fadeUp 0.8s ease 0.9s both;
  }
  .front .line-bottom {
    width: 1px; height: 40px;
    background: linear-gradient(to top, transparent, rgba(201,168,76,0.7));
    margin-top: 18px;
    animation: fadeIn 1s ease 0.1s both;
  }

  /* SPINE */
  .spine-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .spine {
    width: 32px; height: 408px;
    background: #0d0d0c;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    box-shadow: inset -3px 0 8px rgba(0,0,0,0.6), inset 3px 0 8px rgba(0,0,0,0.6);
  }
  .spine::before, .spine::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0; width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(201,168,76,0.12) 20%, rgba(201,168,76,0.12) 80%, transparent);
  }
  .spine::before { left: 0; }
  .spine::after  { right: 0; }
  .spine-text {
    font-family: 'Cinzel', serif;
    font-size: 7px; letter-spacing: 4px;
    color: rgba(201,168,76,0.4); text-transform: uppercase;
    writing-mode: vertical-rl; text-orientation: mixed;
    transform: rotate(180deg);
    animation: fadeIn 1.5s ease 1s both;
  }

  /* BACK */
  .back {
    box-shadow: 8px 0 30px rgba(0,0,0,0.8), 3px 0 6px rgba(0,0,0,0.5), 0 16px 50px rgba(0,0,0,0.9);
    display: flex; align-items: center; justify-content: center;
  }
  .back::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0; width: 10px;
    background: linear-gradient(to left, rgba(0,0,0,0.7) 0%, rgba(255,255,255,0.04) 60%, transparent 100%);
    z-index: 10;
  }
  .back .bg-glow {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 55% 45% at 50% 50%, rgba(201,168,76,0.04) 0%, transparent 100%);
    pointer-events: none; z-index: 1;
  }
  .back .content {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center;
    width: 100%; padding: 0 44px;
  }
  .back .line-top {
    width: 1px; height: 52px;
    background: linear-gradient(to bottom, transparent, rgba(201,168,76,0.55));
    margin-bottom: 30px;
    animation: fadeIn 1.2s ease 0.5s both;
  }
  .back .line-bottom {
    width: 1px; height: 52px;
    background: linear-gradient(to top, transparent, rgba(201,168,76,0.55));
    margin-top: 24px;
    animation: fadeIn 1.2s ease 0.5s both;
  }
  .back .main-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16.5px; font-style: italic; font-weight: 300;
    color: rgba(201,168,76,0.9); text-align: center;
    line-height: 2.4; letter-spacing: 0.5px;
    animation: fadeUp 1.1s ease 0.7s both;
  }
  .back .gold-rule {
    height: 1px; width: 46px;
    background: linear-gradient(to right, transparent, rgba(201,168,76,0.45), transparent);
    margin: 22px 0 18px;
    animation: expandX 0.8s ease 1.2s both;
  }
  .back .logo-lion {
    width: 44px; height: 44px;
    object-fit: contain;
    animation: fadeIn 1s ease 1.4s both;
    margin-bottom: 8px;
  }
  .back .grankers {
    font-family: 'Cinzel', serif;
    font-size: 6.5px; letter-spacing: 5px;
    color: rgba(201,168,76,0.22);
    text-transform: uppercase; text-align: center;
    animation: fadeIn 0.8s ease 1.6s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes expandX {
    from { transform: scaleX(0); opacity: 0; }
    to   { transform: scaleX(1); opacity: 1; }
  }
</style>
</head>
